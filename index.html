<!DOCTYPE html>
<html>
<head>
<title>Coluber</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:
linear-gradient(rgba(10,0,0,0.80), rgba(0,0,0,0.90)),
url("background.jpg");
background-size:cover;
background-position:center;
background-attachment:fixed;

color:white;
font-family:Arial, Helvetica, sans-serif;
text-align:center;
margin:0;
}

/* HEADER */

header{
padding:100px 20px 80px 20px;
}

.logo{
width:520px;
max-width:90%;
}

/* SECTIONS */

section{
padding:70px 20px;
}

h2{
margin-bottom:20px;
font-size:32px;
letter-spacing:1px;
}

/* YOUTUBE VIDEO */

.video-container{
position:relative;
width:100%;
max-width:900px;
margin:auto;
padding-bottom:56.25%;
height:0;
}

.video-container iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

/* LISTEN BUTTONS */

.listen-buttons{
margin-top:30px;
}

.listen-buttons a{
display:inline-block;
margin:10px;
padding:12px 24px;
background:#111;
border:2px solid red;
color:white;
text-decoration:none;
font-weight:bold;
border-radius:6px;
transition:0.3s;
}

.listen-buttons a:hover{
background:red;
color:black;
transform:scale(1.05);
}

/* LINKS */

a{
color:red;
text-decoration:none;
}

/* ABOUT */

.about-text{
max-width:700px;
margin:auto;
line-height:1.6;
font-size:18px;
}

/* FOOTER */

footer{
padding:40px;
font-size:14px;
color:#aaa;
}

</style>
</head>

<body>

<header>

<img src="Coluber_Banner_4K.png" class="logo">

<p>NWOBHM Heavy Metal</p>

</header>

<section>

<h2>Latest Release</h2>

<p>Alone in the Dark</p>

<div class="video-container">

<iframe
src="https://www.youtube.com/embed/yKEstwFq0-0?modestbranding=1&rel=0&showinfo=0"
title="Coluber - Alone in the Dark"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen>
</iframe>

</div>

</section>

<section>

<h2>Listen</h2>

<div class="listen-buttons">

<a href="https://open.spotify.com/artist/2EpYd1RnfNNfQL54zAgiEV" target="_blank" rel="noopener">Spotify</a>

<a href="https://www.youtube.com/@coluber.official" target="_blank" rel="noopener">YouTube</a>

<a href="https://www.instagram.com/coluber.official" target="_blank" rel="noopener">Instagram</a>

<a href="https://www.facebook.com/coluberband" target="_blank" rel="noopener">Facebook</a>

</div>

</section>

<section>

<h2>About</h2>

<p class="about-text">
Coluber is a heavy metal project inspired by the New Wave of British Heavy Metal and classic horror themes.
</p>

</section>

<footer>

© Coluber

</footer>

</body>
</html>
