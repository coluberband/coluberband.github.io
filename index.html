<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coluber</title>

<style>

body{
background:black;
color:white;
font-family:Arial, sans-serif;
text-align:center;
margin:0;
}

/* HEADER */

header{
padding:80px 20px 60px;
}

.logo{
width:600px;
max-width:90%;
height:auto;
}

header p{
margin-top:20px;
font-size:28px;
font-weight:bold;
}

/* SECTIONS */

section{
padding:60px 20px;
}

h2{
margin-bottom:20px;
font-size:48px;
}

.release-title{
font-size:32px;
margin-bottom:30px;
}

/* VIDEO CONTAINER */

.video-container{
position:relative;
width:100%;
max-width:1400px;
margin:auto;
height:0;
overflow:hidden;
}

.video-container iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
border-radius:8px;
}

/* LISTEN BUTTONS */

.listen-buttons{
margin-top:20px;
}

.listen-buttons a{
display:inline-block;
margin:10px;
padding:12px 22px;
background:#111;
border:2px solid red;
color:white;
text-decoration:none;
font-weight:bold;
border-radius:6px;
transition:0.3s;
font-size:18px;
}

.listen-buttons a:hover{
background:red;
color:black;
}

/* ABOUT */

.about-text{
max-width:900px;
margin:0 auto;
line-height:1.6;
font-size:22px;
}

/* FOOTER */

footer{
padding:40px;
font-size:14px;
color:#aaa;
}

/* MOBILE */

@media (max-width:768px){

header{
padding:60px 20px 40px;
}

header p{
font-size:22px;
}

h2{
font-size:36px;
}

.release-title{
font-size:26px;
}

.about-text{
font-size:18px;
}

.listen-buttons a{
display:block;
width:220px;
max-width:80%;
margin:12px auto;
}

}

</style>
</head>

<body>

<header>

<img src="Coluber_Banner_4K.png" alt="Coluber logo" class="logo">

<p>NWOBHM Heavy Metal</p>

</header>

<section>

<h2>Latest Release</h2>

<p class="release-title">Alone in the Dark</p>

<div class="video-container">

<iframe
src="https://www.youtube.com/embed/yKEstwFq0-0?rel=0&modestbranding=1"
title="Coluber - Alone in the Dark"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
allowfullscreen>
</iframe>

</div>

</section>

<section>

<h2>Listen</h2>

<div class="listen-buttons">

<a href="https://open.spotify.com/artist/2EpYd1RnfNNfQL54zAgiEV" target="_blank" rel="noopener">Spotify</a>

<a href="https://www.youtube.com/@coluber.official" target="_blank" rel="noopener">YouTube</a>

<a href="https://www.instagram.com/coluber.official" target="_blank" rel="noopener">Instagram</a>

<a href="https://www.facebook.com/coluberband" target="_blank" rel="noopener">Facebook</a>

</div>

</section>

<section>

<h2>About</h2>

<p class="about-text">
Coluber is a heavy metal project inspired by the New Wave of British Heavy Metal and classic horror themes.
</p>

</section>

<footer>

© Coluber

</footer>

</body>
</html>
